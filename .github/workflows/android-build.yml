name: Build debug APK

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # llama.cpp is a vendored local clone (gitignored), so it never exists on a fresh CI
      # checkout — without this step CMake fails at add_subdirectory(llama.cpp). Pinned to a
      # release tag so CI builds are reproducible; bump deliberately when updating the local clone.
      - name: Vendor llama.cpp (pinned)
        run: git clone --depth 1 --branch b9967 https://github.com/ggml-org/llama.cpp app/src/main/cpp/llama.cpp

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build APKs
        run: ./gradlew --no-daemon assembleDebug assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: teclas-apks
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # On main, also publish the APK to a rolling "debug-latest" Release so there's a stable,
      # direct app-debug.apk download link (no zip) — friendlier to grab from a phone.
      - name: Publish APK to a Release (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: Latest APK
          body: Auto-published build of the latest main. app-release.apk is the small R8-minified build (recommended); app-debug.apk is the debuggable one. Install on Android (allow unknown sources).
          prerelease: true
          make_latest: true
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
